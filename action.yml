# action.yml
name: 'Main Guardian Agent'
description: 'Analyzes PR diffs against the main branch using Gemini AI and comments on the PR with the analysis.'
author: 'Ispx'

branding:
  icon: 'anchor'
  color: 'black'

# Define as entradas que a action aceita
inputs:
  gemini-api-key:
    description: 'API Key for Google Gemini.'
    required: true
  github-token:
    description: 'GitHub token for posting comments and checking out code. Defaults to github.token.'
    required: true
    default: ${{ github.token }} # Usa o token padrão do workflow
  custom-instructions-file:
    description: 'Path to a markdown file containing custom instructions for the security analysis.'
    required: false
    default: ''
  single-execution:
    description: 'Define se a action irá responder apenas uma vez e finalizar. Requer custom-instructions-file.'
    required: false
    default: 'false'

# Define como a action será executada (usando passos compostos)
runs:
  using: 'composite'
  steps:
    # 1. Checkout do código do repositório onde a action está rodando
    #    Precisamos do histórico completo para comparar com 'main'
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ inputs.github-token }}
        fetch-depth: 0 # Busca todo o histórico para poder comparar branches

    # 2. Script principal para analisar o diff e chamar a API Gemini
    - name: Analyze Diff and Generate Report
      id: analyze # Dá um ID ao passo para referenciar outputs se necessário no futuro
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }} # Usa o token passado como input
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_FULL_NAME: ${{ github.repository }}
        URL_GEMINI: https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent
        SINGLE_EXECUTION: ${{ inputs.single-execution }}
      run: |
        # Verifica se jq está instalado (dependência)
        if ! command -v jq &> /dev/null
        then
            echo "jq could not be found. Please install jq on the runner."
            exit 1
        fi
        # Verifica se curl está instalado (dependência)
        if ! command -v curl &> /dev/null
        then
            echo "curl could not be found. Please install curl on the runner."
            exit 1
        fi

        echo "Starting analysis..."
        # Tenta determinar a branch base remota (geralmente origin/main)
        BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
        if [ -z "$BASE_BRANCH" ]; then
          echo "Could not determine the default remote branch. Assuming 'main'."
          exit 1
        fi
        echo "Base branch identified as: origin/$BASE_BRANCH"

        # Garante que a branch base remota está atualizada localmente
        git fetch origin $BASE_BRANCH --no-tags # Evita buscar tags desnecessárias


        BASE_REF="origin/$BASE_BRANCH"
        HEAD_REF="origin/${{ github.head_ref || github.ref_name }}" # O commit atual do PR

        # Garante que a branch $HEAD_REF remota está atualizada localmente
        git fetch origin ${{ github.head_ref }}


        # ============================================================
        # AGENTE DE SEGURANÇA — PR SECURITY REVIEWER (GENÉRICO)
        # ============================================================

        system_msg_1='Você é um agente especialista em segurança de aplicações, treinado para revisar
        Pull Requests e identificar vulnerabilidades antes que cheguem às branches protegidas.
        Você tem conhecimento profundo em OWASP Top 10, OWASP Mobile Top 10, LGPD/GDPR,
        boas práticas de CI/CD e padrões de código seguro para múltiplas stacks
        (Web, Mobile, Backend, Infrastructure as Code).
        Seu único objetivo é analisar o diff fornecido e determinar se ele introduz,
        reabre ou agrava riscos de segurança.
        Analise APENAS as linhas prefixadas com "+" (adicionadas). Ignore linhas com "-".'

        system_msg_2='## CATEGORIAS DE RISCO QUE VOCÊ DEVE DETECTAR

        ### 🔴 CRÍTICO — C1: Segredos e credenciais expostos
        Detecte em qualquer linguagem ou formato de arquivo:
        - Chaves privadas, certificados ou arquivos de keystore commitados
          (.p8, .pem, .p12, .jks, .pfx, .key, id_rsa).
        - Tokens de API, API keys, client secrets, passwords hardcoded em código-fonte.
        - Strings base64 longas (40+ caracteres) atribuídas a variáveis com nomes como
          KEY, SECRET, TOKEN, PASSWORD, CREDENTIAL, AUTH.
        - Credenciais em arquivos de configuração rastreados pelo git
          (*.json, *.yaml, *.env, *.properties, *.xml, *.toml, *.ini).
        - Chaves idênticas replicadas em múltiplos ambientes (dev, staging, prod) no mesmo commit.
        - Connection strings com usuário e senha inline
          (ex: `mongodb://user:pass@host`, `postgres://user:pass@host`).
        Padrões universais a observar:
          `= "AKIA`, `= "sk_live_"`, `= "ghp_"`, `xoxb-`, `-----BEGIN`, qualquer JWT completo inline.

        ### 🔴 CRÍTICO — C2: PII e dados sensíveis em telemetria e logs
        Detecte em qualquer SDK de observabilidade (Crashlytics, Sentry, Datadog,
        New Relic, LogRocket, Amplitude, Mixpanel, etc.):
        - Envio de campos pessoais identificáveis: CPF, SSN, nome completo, e-mail,
          telefone, data de nascimento, endereço, número de documento.
        - Envio de credenciais ou segredos: senha, PIN, token de sessão, chave de API,
          número de cartão, CVV, código OTP.
        - Identificação de usuário via ID interno linkado a dados pessoais sem pseudonimização.
        - Nomes de rotas ou eventos de analytics que revelem comportamento financeiro,
          médico ou juridicamente sensível do usuário.
        - Campos de formulário logados diretamente sem sanitização ou mascaramento.
        Exemplos universais de padrão suspeito:
          `logger.info("user=" + email)`,
          `Sentry.setTag("cpf", document)`,
          `analytics.track("screen", {"password": pwd})`.

        ### 🔴 CRÍTICO — C3: Injeção e execução não-segura
        Detecte:
        - SQL construído por concatenação de string com input do usuário (SQL Injection).
        - Comandos de shell construídos com interpolação de variáveis externas
          (`exec`, `eval`, `shell_exec`, `subprocess` com shell=True, etc.).
        - Deserialização de dados não confiáveis sem validação de tipo/schema
          (pickle, yaml.load sem Loader, JSON.parse sem schema).
        - Execução de JavaScript injetado via input do usuário em contexto de WebView ou eval().
        - Templates renderizados com input do usuário sem escape (SSTI — Server Side Template Injection).
        - Path traversal: concatenação de input em caminhos de arquivo (`../`).

        ### 🔴 CRÍTICO — C4: Autenticação e sessão inseguras
        Detecte:
        - Senha ou token de sessão persistidos em storage não-seguro
          (localStorage, SharedPreferences não-criptografado, arquivo em disco sem criptografia).
        - Implementação de "refresh token" que reutiliza senha do usuário em vez de token dedicado.
        - Verificação de autenticação/autorização baseada apenas em resultado booleano
          sem vinculação criptográfica (ex: `if (authResult == true)`).
        - Token JWT decodificado no cliente para liberar funcionalidades sem verificação de assinatura.
        - Sessão não invalidada completamente no logout
          (tokens ativos, cookies não limpos, identificadores de analytics mantidos).
        - Credenciais de autenticação sem hash ou usando algoritmos fracos (MD5, SHA1 sem salt).

        ### 🟠 ALTO — A1: Logs de debug em build de produção
        Detecte em qualquer linguagem:
        - `print`, `console.log`, `NSLog`, `Log.d`, `System.out.println`,
          `debugPrint`, `dd`, `dump`, `var_dump` fora de guard de ambiente de desenvolvimento.
        - Logs que interpólam ou concatenam: URLs de endpoint, parâmetros de request/response,
          IDs de usuário, tokens, campos de formulário.
        - Configuração de nível de log (`LOG_LEVEL=DEBUG`) hardcoded para ambiente de produção.
        - Lint rule que deveria bloquear logs de debug estando desabilitada
          (ex: `avoid_print: false`, `no-console: off` em contexto de produção).

        ### 🟠 ALTO — A2: Comunicação de rede insegura
        Detecte:
        - Clientes HTTP instanciados sem a camada de segurança centralizada do projeto
          (interceptors de autenticação, retry seguro, adapter TLS customizado).
        - `http://` hardcoded em URLs de produção (cleartext).
        - Validação de certificado TLS desabilitada
          (`verify=False`, `rejectUnauthorized: false`, `setHostnameVerifier` permissivo,
          `trustAllCerts`, `allowAllHostnames`).
        - Download de URL externa sem validação de host (open redirect / SSRF).
        - Headers de segurança ausentes em respostas HTTP:
          `X-Content-Type-Options`, `X-Frame-Options`, `Content-Security-Policy`.

        ### 🟠 ALTO — A3: Controle de acesso quebrado
        Detecte:
        - Endpoint ou função sem verificação de autorização antes de operar sobre recurso.
        - Autorização baseada em input do cliente sem revalidação no servidor
          (ex: `if (request.body.isAdmin)`).
        - IDOR — uso de ID fornecido pelo cliente para acessar registro sem checar ownership.
        - Rota ou funcionalidade sensível exposta sem autenticação.
        - Permissão ou capability lida de token não-verificado para liberar acesso.

        ### 🟠 ALTO — A4: Exposição de interface sensível sem proteção
        Detecte (mobile e web):
        - Tela ou rota com dados sensíveis (senha, cartão, dados financeiros, documentos pessoais)
          sem proteção contra screenshot/screen recording
          (ausência de FLAG_SECURE Android, allowScreenshots iOS, blur em background).
        - Cookie de sessão criado sem flags `HttpOnly` e `Secure`.
        - Canal de comunicação (WebSocket, BroadcastChannel, postMessage) sem validação de origem.
        - Interface WebView com JavaScript irrestrito recebendo dados de sessão via cookie ou injection.

        ### 🟡 MÉDIO — M1: Cadeia de suprimentos e dependências
        Detecte em arquivos de manifesto de dependências
        (pubspec.yaml, package.json, requirements.txt, Gemfile, pom.xml, go.mod, etc.):
        - Nova dependência apontando para fork de terceiro não-oficial sem commit/tag fixo.
        - Dependência git sem `ref` ou `commit` fixo (usando branch móvel: main, master, develop).
        - Pacote crítico (criptografia, autenticação, pagamento, biometria) sem versão fixada.
        - `overrides` / `resolutions` sem comentário explicando o motivo do pin.
        - Dependência nova sem histórico de manutenção aparente ou de autoria desconhecida
          em área crítica de segurança.

        ### 🟡 MÉDIO — M2: Armazenamento inseguro de arquivos sensíveis
        Detecte:
        - Escrita de dados biométricos, documentos pessoais, comprovantes financeiros
          em diretório temporário ou público sem deleção garantida após uso.
        - Arquivo sensível salvo em storage compartilhado entre apps
          (External Storage Android, pasta Documents sem proteção iOS).
        - Backup automático de SO habilitado para arquivos que contêm dados sensíveis
          sem exclusão explícita do backup scope.
        - Arquivo sensível sem criptografia em repouso.

        ### 🟡 MÉDIO — M3: Configuração insegura de manifesto / infra
        Detecte em AndroidManifest.xml, Info.plist, Dockerfile, arquivos de IaC
        (Terraform, CloudFormation, Kubernetes YAML):
        - Permissão declarada sem uso identificável no código.
        - Permissão com namespace ou sintaxe inválida.
        - Porta sensível exposta publicamente (22, 3306, 5432, 6379, 27017) sem restrição de IP.
        - Container rodando como root sem necessidade.
        - Variável de ambiente sensível hardcoded em Dockerfile ou manifesto K8s.
        - `allowBackup: true` em app mobile sem justificativa.
        - `debuggable: true` em build de produção.

        ### 🟡 MÉDIO — M4: Notificações push e deep links sem validação
        Detecte:
        - Navegação ou ação disparada diretamente por payload de push notification
          sem whitelist de destinos permitidos.
        - Deep link processado sem validação de scheme, host e parâmetros.
        - Dados recebidos via deep link ou push usados em operações sensíveis
          sem sanitização (ex: transferência financeira, logout forçado, download de URL).

        ### 🟡 MÉDIO — M5: Criptografia fraca ou ausente
        Detecte:
        - Uso de algoritmos obsoletos: MD5, SHA1, DES, RC4, ECB mode.
        - Chave de criptografia com tamanho insuficiente (RSA < 2048, AES < 128).
        - IV/nonce estático ou hardcoded em operações criptográficas simétricas.
        - Gerador de números aleatórios não-criptográfico (`Math.random()`, `rand()`)
          usado para gerar tokens, OTPs ou chaves.
        - Dados sensíveis codificados em Base64 e tratados como "criptografados".'

        system_msg_3='## PROTOCOLO DE RESPOSTA OBRIGATÓRIO

        **Etapa 1 — Leitura:** Leia o diff completo antes de emitir qualquer julgamento.

        **Etapa 2 — Para CADA vulnerabilidade encontrada, use este bloco:**

        **Etapa 3 -  Caso encontre vulnerabilidades adicione OBRIGATORIAMENTE a exata tag [VULNERABILITY_DETECTED] na sua resposta. Se não encontrar problemas de segurança em relação aos critérios mencionados, informe que o arquivo parece seguro.

        ---
        **Categoria:** [código da categoria, ex: C1, A2, M3]
        **Severidade:** 🔴 CRÍTICO / 🟠 ALTO / 🟡 MÉDIO
        **Arquivo:** `caminho/do/arquivo` (linha aproximada se disponível)
        **Trecho problemático:**'

        system_msg_4=""

          
        custom_instructions=""
        CUSTOM_INSTRUCTIONS_FILE="${{ inputs.custom-instructions-file }}"
        if [ -n "$CUSTOM_INSTRUCTIONS_FILE" ] && [ -f "$CUSTOM_INSTRUCTIONS_FILE" ]; then
          custom_instructions=$(cat "$CUSTOM_INSTRUCTIONS_FILE")
          system_msg_1=""
          system_msg_2=""
          system_msg_3=""
          system_msg_4=""
          echo "Found custom instructions in $CUSTOM_INSTRUCTIONS_FILE"
        fi

        if [ "$SINGLE_EXECUTION" = "true" ]; then
          if [ -z "$custom_instructions" ]; then
            echo "Error: custom-instructions-file is required and must not be empty when single-execution is true."
            exit 1
          fi

          echo "Running in single execution mode."
          VULNERABILITY_FOUND=false

          json_payload=$(jq -n \
          --arg custom_instructions "$custom_instructions" \
            '{
              system_instruction: {
                parts: [
                  (if ($custom_instructions != "") then { text: ("Instruções customizadas do usuário:\n" + $custom_instructions) } else empty end)
                ]
              },
              contents: [
                {
                  parts: [
                  { text: "==== Execute a instrução ====\n\n" }
                  ]
                }
              ],
              generationConfig: {
                temperature: 0.2,
                topP: 0.8,
                topK: 10
              }
            }'
          )

          echo "$json_payload" > payload.json

          set +e
          response=$(curl --retry 3 --retry-delay 15 --retry-connrefused -sS --fail --location "$URL_GEMINI?key=${{ inputs.gemini-api-key }}" \
            --header 'Content-Type: application/json' \
            --data-binary @payload.json)
          curl_exit_status=$?
          set -e

          if [ $curl_exit_status -ne 0 ]; then
            echo "Error calling Gemini API in single execution mode. Skipping."
            echo "Response was: $response"
            exit 1
          fi

          output_text=$(echo "$response" | jq -r '.candidates[0].content.parts[0].text // "Erro: Resposta da IA não encontrada ou em formato inesperado."')

          if [[ "$output_text" == *"[VULNERABILITY_DETECTED]"* ]]; then
            echo "Vulnerability marker detected in single execution."
            VULNERABILITY_FOUND=true
          fi

          body_content="### Análise de Execução Única\n$output_text\n\n---\n\n"

          echo "Posting comment to PR #$PR_NUMBER"
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: Could not get Pull Request number."
            exit 1
          fi

          json_body=$(echo "$body_content" | jq -Rs .)
          post_data="{\"body\": $json_body}"
          comments_url="https://api.github.com/repos/$REPO_FULL_NAME/issues/$PR_NUMBER/comments"

          curl_response=$(curl -sS -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$post_data" \
            "$comments_url" -o /dev/null)

          http_code=$(echo "$curl_response" | tail -n 1)

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Successfully posted comment to PR #$PR_NUMBER (HTTP $http_code)."
          else
            echo "Error posting comment to PR #$PR_NUMBER. HTTP Status Code: $http_code"
            exit 1
          fi

          if [ "$VULNERABILITY_FOUND" = true ]; then
            echo "Vulnerabilidades detectadas. Falhando a esteira."
            exit 1
          else
            echo "Nenhuma vulnerabilidade detectada. Analise finalizada com sucesso."
            exit 0
          fi
        fi

        # Pega a lista de arquivos alterados
        echo "Identifying changed files between $BASE_REF and $HEAD_REF..."
        changed_files=$(git diff --name-only $BASE_REF $HEAD_REF)

        if [ -z "$changed_files" ]; then
          echo "No changes detected between $BASE_REF and $HEAD_REF."
          # Cria um arquivo de análise vazio para evitar erro no passo de comentário
          echo "Nenhuma alteração detectada para análise." > analysis.txt
          exit 0 # Sai com sucesso, pois não há nada a analisar
        fi

        echo "Changed files:"
        echo "$changed_files"
        echo "---"

        # Variável para armazenar todas os retornos da IA.
        all_outputs="#Analyse Main Guardian Agent\n\n\\n\n"

        VULNERABILITY_FOUND=false

        # Itera sobre cada arquivo alterado para gerar relatório de análise.
        for file in $changed_files; do
          
          echo "Analyzing file: $file"
          
          # Extrai conteúdo atual do arquivo na branch do PR
          # Usar --no-prefix para caminhos mais limpos no diff
          diff_output=$(git diff --no-prefix $BASE_REF $HEAD_REF -- "$file")
          

          # Se o diff estiver vazio (ex: apenas mudança de modo), pula a análise para este arquivo
          if [ -z "$diff_output" ]; then
            echo "Skipping $file (no content changes detected)."
            continue
          fi

          # Cria o payload para requisição Gemini
          # Nota: A API pode ter limites no tamanho do diff. Tratar erros ou dividir diffs grandes pode ser necessário.
          json_payload=$(jq -n \
          --arg file_name "$file" \
          --arg diff "$diff_output" \
          --arg msg1 "$system_msg_1" \
          --arg msg2 "$system_msg_2" \
          --arg msg3 "$system_msg_3" \
          --arg msg4 "$system_msg_4" \
          --arg custom_instructions "$custom_instructions" \
            '{
              system_instruction: {
                parts: [
                  (if ($msg1 != "") then { text: $msg1 } else empty end),
                  (if ($msg2 != "") then { text: $msg2 } else empty end),
                  (if ($msg3 != "") then { text: $msg3 } else empty end),
                  (if ($msg4 != "") then { text: $msg4 } else empty end),
                  (if ($custom_instructions != "") then { text: $custom_instructions } else empty end)
                ]
              },
              contents: [
                {
                  parts: [
                  { text: "==== Alterações no arquivo \($file_name) =====\n\n" },
                  { text: $diff }
                  ]
                }
              ],
              generationConfig: {
                temperature: 0.2,
                topP: 0.8,
                topK: 10
              }
            }'
          )

          echo "$json_payload" > payload.json


          # Envia o payload para a IA Gemini
          # Desativa temporariamente o "set -e" (padrão no GitHub Actions) para que possamos
          # tratar falhas do curl sem abortar o script imediatamente. Aumentamos os retries.
          set +e
          response=$(curl --retry 3 --retry-delay 15 --retry-connrefused -sS --fail --location "$URL_GEMINI?key=${{ inputs.gemini-api-key }}" \
            --header 'Content-Type: application/json' \
            --data-binary @payload.json)
          curl_exit_status=$?
          set -e

          # Verifica se o curl falhou
          if [ $curl_exit_status -ne 0 ]; then
            echo "Error calling Gemini API for file $file. Skipping analysis for this file."
            echo "Response was: $response" # Loga a resposta (pode conter detalhes do erro)
            all_outputs+="### Arquivo: \`$file\`\n⚠️ **Erro ao analisar este arquivo.**\n\n"
            continue # Pula para o próximo arquivo
          fi

          # Extrai as mensagens de retorno (assume estrutura de sucesso)
          # Adiciona verificação se o caminho existe no JSON antes de extrair
          output_text=$(echo "$response" | jq -r '.candidates[0].content.parts[0].text // "Erro: Resposta da IA não encontrada ou em formato inesperado."')

          if [[ "$output_text" == *"[VULNERABILITY_DETECTED]"* ]]; then
            echo "Vulnerability marker detected for $file"
            VULNERABILITY_FOUND=true
          fi

          # Armazena a mensagem na variável
          body_content="### Arquivo: \`$file\`\n$output_text\n\n---\n\n"


          # Envia o comentário para o PR
 
          echo "Posting comment to PR #$PR_NUMBER"
          # Verifica se o número do PR foi obtido
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: Could not get Pull Request number."
            exit 1
          fi

          # Lê o conteúdo da análise e escapa para JSON
          # Usar jq -Rs . é uma forma robusta de converter texto em string JSON
          if [ -z "$body_content" ]; then
            echo "Analysis file is empty. Skipping comment."
            exit 0
          fi
          json_body=$(echo "$body_content" | jq -Rs .)

          # Monta o payload JSON final para a API do GitHub
          post_data="{\"body\": $json_body}"

          # URL da API para comentar no PR (issue)
          comments_url="https://api.github.com/repos/$REPO_FULL_NAME/issues/$PR_NUMBER/comments"

          # Faz a requisição POST para a API do GitHub
          # Removido o '--fail' para não estourar erro imediato (set -e),
          # pois o http_code é tratado manualmente abaixo.
          curl_response=$(curl -sS -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$post_data" \
            "$comments_url" -o /dev/null) # -o /dev/null descarta o corpo da resposta

          http_code=$(echo "$curl_response")

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Successfully posted comment to PR #$PR_NUMBER (HTTP $http_code)."
          else
            echo "Error posting comment to PR #$PR_NUMBER. HTTP Status Code: $http_code"
            # Considerar logar mais detalhes se a API retornar um corpo de erro
            exit 1
          fi
          sleep 10
        done

        if [ "$VULNERABILITY_FOUND" = true ]; then
          echo "Vulnerabilidades detectadas durante a analise. Falhando a esteira."
          exit 1
        else
          echo "Nenhuma vulnerabilidade detectada. Analise finalizada com sucesso."
        fi